name: Fotus Token Keeper

on:
  schedule:
    - cron: '*/45 * * * *'   # a cada 45 minutos
  workflow_dispatch:           # permite rodar manualmente se necessário

jobs:
  keep-token-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Renovar token Fotus
        env:
          GITHUB_PAT: ${{ secrets.FOTUS_GITHUB_PAT }}
          GIST_ID: ${{ secrets.FOTUS_GIST_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/fotus_cloud_keeper.py
